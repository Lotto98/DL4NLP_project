_BASE_: "Base-DiffusionDet.yaml"
MODEL:
  BACKBONE:
    NAME:  "build_ASTModel_backbone_fpn"
  AST:
    PRETRAINED_MODEL: "MIT/ast-finetuned-audioset-10-10-0.448-v2"
  DiffusionDet:
    HIDDEN_DIM: 256
    NUM_PROPOSALS: 20
    NUM_CLASSES: 1
    SAMPLE_STEP: 1
    NMS_THRESH: 0.5
    BOX_RENEWAL_THRESHOLD: 0.5
    DEEP_SUPERVISION: False
  EMA_ENABLED: False
DATASETS:
  TRAIN: ("ami_train",)
  # EVAL: ("ami_val",)
  TEST:  ("ami_validation",)
INPUT:
  SAMPLING_RATE: 16000
  SECONDS_PER_SEGMENT: 10 #30
  TOT_BATCH_SIZE: 14
  NUM_WORKERS: 1
  TRAINING_DATASET_LENGTH: 29312
